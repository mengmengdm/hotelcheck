name: Hotel availability monitor

on:
  schedule:
    # Every 30 min. GitHub Actions cron is in UTC and may drift 5-15 min.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # needed to commit state.json back

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Check availability for all subscribers
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          # Scheduled runs notify only on diff.
          # Manual dispatch always pushes current status (for testing).
          NOTIFY_FLAG="--notify"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOTIFY_FLAG="--always-notify"
          fi
          python monitor.py \
            --subscriptions-file subscriptions.yaml \
            --state-file state.json \
            $NOTIFY_FLAG

      - name: Commit updated state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "chore: update availability snapshot [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              sleep $((RANDOM % 5 + 1))
            done
          fi

      - name: Notify admin on failure
        if: failure()
        env:
          SERVERJIANG_SENDKEY: ${{ secrets.SERVERJIANG_SENDKEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import os, sys
          sys.path.insert(0, ".")
          from monitor import push_all
          title = "⚠️ Jungfrau Lodge 监控失败"
          desp = (
              "监控任务执行失败,请检查。\n\n"
              f"- 查看日志: [Actions Run]({os.environ['RUN_URL']})\n\n"
              "可能原因: 网站宕机、改版、网络问题、或 subscriptions.yaml 损坏。"
          )
          channels = push_all(title, desp)
          print(f"Pushed failure to: {channels or '(none)'}")
          PY
