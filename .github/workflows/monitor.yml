name: Hotel availability monitor

on:
  schedule:
    # Every 30 min. GitHub Actions cron is in UTC and may drift 5-15 min.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      arrival:
        description: "Arrival date (YYYY-MM-DD), override default"
        required: false
      departure:
        description: "Departure date (YYYY-MM-DD), override default"
        required: false

permissions:
  contents: write  # needed to commit state.json back

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Add or remove date ranges here. Each runs independently.
        include:
          - arrival: "2026-07-01"
            departure: "2026-07-07"
            adults: 2
            rooms: 1
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Check availability
        env:
          SERVERJIANG_SENDKEY: ${{ secrets.SERVERJIANG_SENDKEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        run: |
          # Manual dispatch always pushes a status summary (for testing).
          # Scheduled runs only notify on diff.
          NOTIFY_FLAG="--notify"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NOTIFY_FLAG="--always-notify"
          fi
          python monitor.py \
            --arrival "${{ inputs.arrival || matrix.arrival }}" \
            --departure "${{ inputs.departure || matrix.departure }}" \
            --adults ${{ matrix.adults }} \
            --rooms ${{ matrix.rooms }} \
            --state-file state.json \
            $NOTIFY_FLAG

      - name: Commit updated state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "chore: update availability snapshot [skip ci]"
            # Retry-on-conflict because parallel matrix jobs may race.
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              sleep $((RANDOM % 5 + 1))
            done
          fi

      - name: Notify on failure
        if: failure()
        env:
          SERVERJIANG_SENDKEY: ${{ secrets.SERVERJIANG_SENDKEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARRIVAL: ${{ inputs.arrival || matrix.arrival }}
          DEPARTURE: ${{ inputs.departure || matrix.departure }}
        run: |
          python - <<'PY'
          import os, sys
          sys.path.insert(0, ".")
          from monitor import push_all
          title = f"⚠️ Jungfrau Lodge 监控失败 ({os.environ['ARRIVAL']} → {os.environ['DEPARTURE']})"
          desp = (
              f"监控任务执行失败,请检查。\n\n"
              f"- 日期: {os.environ['ARRIVAL']} → {os.environ['DEPARTURE']}\n"
              f"- 查看日志: [Actions Run]({os.environ['RUN_URL']})\n\n"
              "可能原因: 网站宕机、改版、或网络问题。"
          )
          channels = push_all(title, desp)
          print(f"Pushed failure to: {channels or '(none)'}")
          PY
