# Jungfrau Lodge availability subscriptions.
#
# Each entry triggers per-night checks for that subscriber's date range,
# filtered to rooms_filter (case-insensitive name substring) if set,
# and emails them at `email` when matching rooms become available.
#
# Fields:
#   id:                 unique identifier (any string)
#   email:              recipient address
#   arrival:            YYYY-MM-DD (range start, inclusive)
#   departure:          YYYY-MM-DD (range end, exclusive)
#   adults:             default 2
#   rooms:              number of rooms requested, default 1
#   rooms_filter:       optional list of name keywords; if empty, all rooms count
#   unsubscribe_token:  random string used by future unsubscribe link
#   created_at:         when the subscription was added

subscribers:
  - id: "owner-grindelwald-2026-07"
    email: "mengmengdm27@gmail.com"
    arrival: "2026-07-01"
    departure: "2026-07-07"
    adults: 2
    rooms: 1
    rooms_filter: []
    unsubscribe_token: "owner-bootstrap"
    created_at: "2026-05-23"
